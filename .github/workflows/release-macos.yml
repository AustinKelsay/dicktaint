name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build architecture-matched whisper sidecar
        run: bun run whisper:sidecar

      - name: Validate macOS sidecar binary
        run: |
          set -euo pipefail
          sidecar="src-tauri/binaries/whisper-cli-${{ matrix.target }}"
          test -x "$sidecar"
          file "$sidecar" | grep -qi "Mach-O"

      - name: Build Tauri bundles
        run: bun run tauri:build -- --bundles app,dmg

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp src-tauri/target/release/bundle/dmg/*.dmg dist/
          cp src-tauri/target/release/bundle/macos/*.app.tar.gz dist/
          shasum -a 256 dist/* > "dist/SHA256SUMS-${{ matrix.target }}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: dist/*

  publish-release:
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true
          path: release-assets

      - name: Generate combined checksums
        run: |
          set -euo pipefail
          shasum -a 256 release-assets/*.dmg release-assets/*.app.tar.gz > release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
