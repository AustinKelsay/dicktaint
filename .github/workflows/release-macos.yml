name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build architecture-matched whisper sidecar
        run: bun run whisper:sidecar

      - name: Validate macOS sidecar binary
        run: |
          set -euo pipefail
          sidecar="src-tauri/binaries/whisper-cli-${{ matrix.target }}"
          test -x "$sidecar"
          file "$sidecar" | grep -qi "Mach-O"

      - name: Build Tauri bundles
        run: bun run tauri:build -- --bundles app,dmg

      - name: Collect artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p dist
          target="${{ matrix.target }}"

          dmg_files=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ "${#dmg_files[@]}" -eq 0 ]; then
            echo "No .dmg files produced."
            exit 1
          fi
          for dmg in "${dmg_files[@]}"; do
            base="$(basename "$dmg" .dmg)"
            cp "$dmg" "dist/${base}-${target}.dmg"
          done

          app_archives=(src-tauri/target/release/bundle/macos/*.app.tar.gz)
          if [ "${#app_archives[@]}" -gt 0 ]; then
            for archive in "${app_archives[@]}"; do
              base="$(basename "$archive" .app.tar.gz)"
              cp "$archive" "dist/${base}-${target}.app.tar.gz"
            done
          else
            app_bundles=(src-tauri/target/release/bundle/macos/*.app)
            if [ "${#app_bundles[@]}" -eq 0 ]; then
              echo "No macOS .app bundle or .app.tar.gz archive produced."
              exit 1
            fi
            for app in "${app_bundles[@]}"; do
              base="$(basename "$app" .app)"
              tar -czf "dist/${base}-${target}.app.tar.gz" -C "$(dirname "$app")" "$(basename "$app")"
            done
          fi

          shasum -a 256 dist/* > "dist/SHA256SUMS-${target}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: dist/*

  publish-release:
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true
          path: release-assets

      - name: Generate combined checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-assets/*.dmg release-assets/*.app.tar.gz)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found to checksum."
            exit 1
          fi
          shasum -a 256 "${files[@]}" > release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
