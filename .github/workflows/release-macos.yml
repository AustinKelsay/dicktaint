name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate macOS sidecar binary
        run: |
          test -x src-tauri/binaries/whisper-cli-aarch64-apple-darwin
          file src-tauri/binaries/whisper-cli-aarch64-apple-darwin

      - name: Build Tauri bundles
        run: bun run tauri:build -- --bundles app,dmg

      - name: Generate checksums
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/release/bundle"
          files=$(find "$bundle_dir" -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \))
          if [ -z "$files" ]; then
            echo "No build artifacts found in $bundle_dir"
            exit 1
          fi
          printf "%s\n" "$files" | while IFS= read -r f; do
            shasum -a 256 "$f"
          done > "$bundle_dir/SHA256SUMS.txt"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/SHA256SUMS.txt
