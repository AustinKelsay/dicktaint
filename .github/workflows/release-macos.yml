name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            bundles: app
    runs-on: ${{ matrix.runner }}
    environment: prod
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate signing and notarization configuration
        run: |
          set -euo pipefail
          missing=()

          [[ -n "${APPLE_CERTIFICATE:-}" ]] || missing+=("APPLE_CERTIFICATE")
          [[ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]] || missing+=("APPLE_CERTIFICATE_PASSWORD")

          if [ -n "${APPLE_ID:-}" ] || [ -n "${APPLE_PASSWORD:-}" ] || [ -n "${APPLE_TEAM_ID:-}" ]; then
            [[ -n "${APPLE_ID:-}" ]] || missing+=("APPLE_ID")
            [[ -n "${APPLE_PASSWORD:-}" ]] || missing+=("APPLE_PASSWORD")
            [[ -n "${APPLE_TEAM_ID:-}" ]] || missing+=("APPLE_TEAM_ID")
          elif [ -n "${APPLE_API_KEY:-}" ] || [ -n "${APPLE_API_ISSUER:-}" ] || [ -n "${APPLE_API_KEY_CONTENT:-}" ]; then
            [[ -n "${APPLE_API_KEY:-}" ]] || missing+=("APPLE_API_KEY")
            [[ -n "${APPLE_API_ISSUER:-}" ]] || missing+=("APPLE_API_ISSUER")
            [[ -n "${APPLE_API_KEY_CONTENT:-}" ]] || missing+=("APPLE_API_KEY_CONTENT")
          else
            missing+=("APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID or APPLE_API_KEY/APPLE_API_ISSUER/APPLE_API_KEY_CONTENT")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing release signing/notarization configuration:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Prepare App Store Connect API key
        if: ${{ env.APPLE_API_KEY_CONTENT != '' }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build architecture-matched whisper sidecar
        run: bun run whisper:sidecar

      - name: Validate macOS sidecar binary
        run: |
          set -euo pipefail
          sidecar="src-tauri/binaries/whisper-cli-${{ matrix.target }}"
          test -x "$sidecar"
          file "$sidecar" | grep -qi "Mach-O"

      - name: Build Tauri bundles
        run: bun run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Validate macOS app bundle signature
        run: |
          set -euo pipefail
          shopt -s nullglob
          app_bundles=(src-tauri/target/release/bundle/macos/*.app)
          if [ "${#app_bundles[@]}" -eq 0 ]; then
            echo "No macOS .app bundle produced."
            exit 1
          fi
          for app in "${app_bundles[@]}"; do
            codesign --verify --deep --strict "$app"
          done

      - name: Validate microphone entitlement
        run: |
          set -euo pipefail
          shopt -s nullglob
          app_bundles=(src-tauri/target/release/bundle/macos/*.app)
          if [ "${#app_bundles[@]}" -eq 0 ]; then
            echo "No macOS .app bundle produced."
            exit 1
          fi
          for app in "${app_bundles[@]}"; do
            entitlements="$(codesign -d --entitlements :- "$app" 2>&1)"
            printf '%s\n' "$entitlements" | grep -q '<key>com.apple.security.device.audio-input</key>'
          done

      - name: Collect artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p dist
          target="${{ matrix.target }}"

          dmg_files=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ "${#dmg_files[@]}" -gt 0 ]; then
            for dmg in "${dmg_files[@]}"; do
              base="$(basename "$dmg" .dmg)"
              cp "$dmg" "dist/${base}-${target}.dmg"
            done
          elif [[ "${{ matrix.bundles }}" == *"dmg"* ]]; then
            echo "No .dmg files produced."
            exit 1
          fi

          app_archives=(src-tauri/target/release/bundle/macos/*.app.tar.gz)
          if [ "${#app_archives[@]}" -gt 0 ]; then
            for archive in "${app_archives[@]}"; do
              base="$(basename "$archive" .app.tar.gz)"
              cp "$archive" "dist/${base}-${target}.app.tar.gz"
            done
          else
            app_bundles=(src-tauri/target/release/bundle/macos/*.app)
            if [ "${#app_bundles[@]}" -eq 0 ]; then
              echo "No macOS .app bundle or .app.tar.gz archive produced."
              exit 1
            fi
            for app in "${app_bundles[@]}"; do
              base="$(basename "$app" .app)"
              tar -czf "dist/${base}-${target}.app.tar.gz" -C "$(dirname "$app")" "$(basename "$app")"
            done
          fi

          shasum -a 256 dist/* > "dist/SHA256SUMS-${target}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: dist/*

  publish-release:
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          merge-multiple: true
          path: release-assets

      - name: Generate combined checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-assets/*.dmg release-assets/*.app.tar.gz)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found to checksum."
            exit 1
          fi
          shasum -a 256 "${files[@]}" > release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
