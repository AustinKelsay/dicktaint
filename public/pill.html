<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background-color: rgba(0, 0, 0, 0) !important;
      background: rgba(0, 0, 0, 0) !important;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }

    .pill {
      position: fixed;
      inset: 3px;
      border-radius: 999px;
      background: rgba(18, 18, 20, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      overflow: hidden;
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transition: box-shadow 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .pill[data-state="listening"] {
      background: rgba(27, 19, 9, 0.92);
      box-shadow:
        0 0 0 1px rgba(255, 140, 0, 0.72),
        0 7px 14px rgba(255, 140, 0, 0.14),
        inset 0 1px 0 rgba(255, 210, 148, 0.1);
    }

    .pill[data-state="processing"] { cursor: default; }
    .pill[data-state="error"] {
      background: rgba(41, 14, 14, 0.94);
      box-shadow:
        0 0 0 1px rgba(255, 98, 98, 0.58),
        0 8px 16px rgba(132, 20, 20, 0.18),
        inset 0 1px 0 rgba(255, 214, 214, 0.08);
    }

    .drag {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      cursor: move;
    }
    .click {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      cursor: pointer;
      z-index: 2;
    }
    .pill[data-state="processing"] .click { pointer-events: none; }

    .icon-mic {
      pointer-events: none;
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      opacity: 0.84;
    }
    .pill[data-state="listening"] .icon-mic {
      opacity: 1;
      filter: drop-shadow(0 0 5px rgba(255, 140, 0, 0.22));
    }
    .pill[data-state="processing"] .icon-mic { opacity: 0.44; }
    .pill[data-state="error"] .icon-mic { opacity: 0.68; }

    .waveform {
      display: none;
      align-items: center;
      gap: 2px;
      height: 9px;
      pointer-events: none;
      position: relative;
      z-index: 3;
    }
    .pill[data-state="listening"] .waveform { display: flex; }
    .waveform span {
      display: block;
      width: 1.5px;
      border-radius: 1px;
      background: rgb(255, 138, 0);
      animation: wave 0.85s ease-in-out infinite;
    }
    .waveform span:nth-child(1) { height: 3px; animation-delay: 0s; }
    .waveform span:nth-child(2) { height: 6px; animation-delay: 0.11s; }
    .waveform span:nth-child(3) { height: 8px; animation-delay: 0.22s; }
    .waveform span:nth-child(4) { height: 6px; animation-delay: 0.33s; }
    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50%       { transform: scaleY(1.8); }
    }

    .spinner {
      display: none;
      width: 9px;
      height: 9px;
      border: 1.5px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.72);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      pointer-events: none;
      position: relative;
      z-index: 3;
      flex-shrink: 0;
    }
    .pill[data-state="processing"] .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="pill" id="pill" data-state="idle">
    <div class="drag" data-tauri-drag-region="true"></div>
    <div class="click" id="click"></div>

    <svg class="icon-mic" width="8" height="8" viewBox="0 0 24 24" fill="none"
         stroke="rgba(255,255,255,0.76)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="9" y1="22" x2="15" y2="22"/>
    </svg>

    <div class="waveform" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="spinner" aria-hidden="true"></div>
  </div>

  <script>
    (function () {
      const pill  = document.getElementById('pill');
      const click = document.getElementById('click');

      let state = 'idle';

      function setState(s) {
        if (s === 'error') {
          state = 'error';
          pill.setAttribute('data-state', 'error');
          setTimeout(() => {
            if (state === 'error') {
              state = 'idle';
              pill.setAttribute('data-state', 'idle');
            }
          }, 1400);
          return;
        }
        state = s;
        pill.setAttribute('data-state', s);
      }

      function getInvoke() {
        return window.__TAURI__?.core?.invoke ?? window.__TAURI__?.tauri?.invoke ?? null;
      }

      click.addEventListener('click', async () => {
        if (state === 'processing') return;
        const invoke = getInvoke();
        if (!invoke) return;
        if (state === 'idle') {
          try { await invoke('start_native_dictation'); setState('listening'); }
          catch (e) { console.error(e); setState('error'); }
        } else if (state === 'listening') {
          setState('processing');
          try { await invoke('stop_native_dictation'); }
          catch (e) { console.error(e); setState('error'); }
        }
      });

      const ev = window.__TAURI__?.event;
      if (ev?.listen) {
        ev.listen('dictation:state-changed', ({ payload }) => setState(payload?.state ?? 'idle')).catch(() => {});
        ev.listen('dictation:hotkey-triggered', () => { if (state !== 'processing') click.click(); }).catch(() => {});
      }
    })();
  </script>
</body>
</html>
