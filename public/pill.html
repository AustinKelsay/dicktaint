<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background-color: rgba(0, 0, 0, 0) !important;
      background: rgba(0, 0, 0, 0) !important;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }

    .pill {
      position: fixed;
      inset: 3px;
      --live-level: 0;
      border-radius: 999px;
      background: rgba(18, 18, 20, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      overflow: hidden;
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transition: box-shadow 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .pill[data-state="listening"] {
      background: rgba(27, 19, 9, 0.92);
      box-shadow:
        0 0 0 1px rgba(255, 140, 0, 0.72),
        0 7px 14px rgba(255, 140, 0, 0.14),
        inset 0 1px 0 rgba(255, 210, 148, 0.1);
    }

    .pill[data-state="listening"][data-audio-state="ready"] {
      background: rgba(10, 28, 24, 0.94);
      box-shadow:
        0 0 0 1px rgba(47, 192, 163, 0.74),
        0 8px calc(20px + (10px * var(--live-level))) rgba(47, 192, 163, 0.18),
        inset 0 1px 0 rgba(192, 255, 243, 0.1);
    }

    .pill[data-state="listening"][data-audio-state="low"] {
      background: rgba(34, 22, 8, 0.94);
      box-shadow:
        0 0 0 1px rgba(255, 169, 84, 0.74),
        0 7px calc(16px + (8px * var(--live-level))) rgba(255, 169, 84, 0.14),
        inset 0 1px 0 rgba(255, 226, 186, 0.1);
    }

    .pill[data-state="listening"][data-audio-state="hot"] {
      background: rgba(40, 18, 12, 0.95);
      box-shadow:
        0 0 0 1px rgba(255, 118, 82, 0.8),
        0 8px calc(20px + (12px * var(--live-level))) rgba(255, 118, 82, 0.18),
        inset 0 1px 0 rgba(255, 220, 211, 0.12);
    }

    .pill[data-state="processing"] { cursor: default; }
    .pill[data-state="error"] {
      background: rgba(41, 14, 14, 0.94);
      box-shadow:
        0 0 0 1px rgba(255, 98, 98, 0.58),
        0 8px 16px rgba(132, 20, 20, 0.18),
        inset 0 1px 0 rgba(255, 214, 214, 0.08);
    }

    .drag {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      cursor: move;
    }
    .click {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      cursor: pointer;
      z-index: 2;
    }
    .pill[data-state="processing"] .click { pointer-events: none; }

    .icon-mic {
      pointer-events: none;
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      opacity: 0.84;
    }
    .pill[data-state="listening"] .icon-mic {
      opacity: 1;
      filter: drop-shadow(0 0 5px rgba(255, 140, 0, 0.22));
    }
    .pill[data-state="processing"] .icon-mic { opacity: 0.44; }
    .pill[data-state="error"] .icon-mic { opacity: 0.68; }

    .waveform {
      display: none;
      align-items: center;
      gap: 2px;
      height: 11px;
      pointer-events: none;
      position: relative;
      z-index: 3;
    }
    .pill[data-state="listening"] .waveform { display: flex; }
    .waveform span {
      display: block;
      width: 1.5px;
      border-radius: 1px;
      background: rgb(255, 138, 0);
      height: calc(2px + (var(--bar-level, 0.08) * 10px));
      transition: height 80ms ease, background-color 120ms ease, opacity 120ms ease;
    }

    .pill[data-state="listening"][data-audio-state="ready"] .waveform span {
      background: rgb(47, 192, 163);
    }

    .pill[data-state="listening"][data-audio-state="low"] .waveform span {
      background: rgb(255, 176, 92);
    }

    .pill[data-state="listening"][data-audio-state="hot"] .waveform span {
      background: rgb(255, 122, 89);
    }

    .spinner {
      display: none;
      width: 9px;
      height: 9px;
      border: 1.5px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.72);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      pointer-events: none;
      position: relative;
      z-index: 3;
      flex-shrink: 0;
    }
    .pill[data-state="processing"] .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="pill" id="pill" data-state="idle">
    <div class="drag" data-tauri-drag-region="true"></div>
    <div class="click" id="click"></div>

    <svg class="icon-mic" width="8" height="8" viewBox="0 0 24 24" fill="none"
         stroke="rgba(255,255,255,0.76)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="9" y1="22" x2="15" y2="22"/>
    </svg>

    <div class="waveform" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="spinner" aria-hidden="true"></div>
  </div>

  <script>
    (function () {
      const pill  = document.getElementById('pill');
      const click = document.getElementById('click');
      const waveformBars = Array.from(document.querySelectorAll('.waveform span'));
      const DICTATION_AUDIO_LEVEL_EVENT = 'dictation:audio-level';

      let state = 'idle';
      let currentSessionId = null;

      function clampLevel(value) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) return 0;
        return Math.max(0, Math.min(1, numeric));
      }

      function compressBars(source, count) {
        const values = Array.isArray(source) ? source : [];
        if (!values.length) {
          return Array.from({ length: count }, (_, index) => 0.08 + ((index % 2) * 0.08));
        }

        const bars = [];
        for (let index = 0; index < count; index += 1) {
          const start = Math.floor((index * values.length) / count);
          const end = Math.max(start + 1, Math.floor(((index + 1) * values.length) / count));
          let peak = 0;
          for (let sourceIndex = start; sourceIndex < end && sourceIndex < values.length; sourceIndex += 1) {
            peak = Math.max(peak, clampLevel(values[sourceIndex]));
          }
          bars.push(peak);
        }
        return bars;
      }

      function audioStateForLevel(level) {
        if (state !== 'listening') return 'idle';
        if (level < 0.18) return 'low';
        if (level > 0.92) return 'hot';
        return 'ready';
      }

      function resetMeter() {
        pill.dataset.audioState = state === 'error' ? 'error' : 'idle';
        pill.style.setProperty('--live-level', '0');
        for (const bar of waveformBars) {
          bar.style.setProperty('--bar-level', '0.080');
        }
      }

      function setMeter(level, bars) {
        const normalizedLevel = clampLevel(level);
        pill.dataset.audioState = audioStateForLevel(normalizedLevel);
        pill.style.setProperty('--live-level', normalizedLevel.toFixed(3));
        const normalizedBars = compressBars(bars, waveformBars.length);
        for (let index = 0; index < waveformBars.length; index += 1) {
          waveformBars[index].style.setProperty('--bar-level', normalizedBars[index].toFixed(3));
        }
      }

      function setState(s) {
        if (s === 'error') {
          state = 'error';
          pill.setAttribute('data-state', 'error');
          resetMeter();
          setTimeout(() => {
            if (state === 'error') {
              state = 'idle';
              pill.setAttribute('data-state', 'idle');
              currentSessionId = null;
              resetMeter();
            }
          }, 1400);
          return;
        }
        state = s;
        pill.setAttribute('data-state', s);
        if (state !== 'listening') {
          currentSessionId = state === 'processing' ? currentSessionId : null;
          resetMeter();
        } else {
          setMeter(0, []);
        }
      }

      function getInvoke() {
        return window.__TAURI__?.core?.invoke ?? window.__TAURI__?.tauri?.invoke ?? null;
      }

      click.addEventListener('click', async () => {
        if (state === 'processing') return;
        const invoke = getInvoke();
        if (!invoke) return;
        if (state === 'idle') {
          try { await invoke('start_native_dictation'); setState('listening'); }
          catch (e) { console.error(e); setState('error'); }
        } else if (state === 'listening') {
          setState('processing');
          try { await invoke('stop_native_dictation'); }
          catch (e) { console.error(e); setState('error'); }
        }
      });

      const ev = window.__TAURI__?.event;
      if (ev?.listen) {
        ev.listen('dictation:state-changed', ({ payload }) => {
          if (payload?.session_id !== null && payload?.session_id !== undefined) {
            currentSessionId = String(payload.session_id);
          }
          setState(payload?.state ?? 'idle');
        }).catch(() => {});
        ev.listen(DICTATION_AUDIO_LEVEL_EVENT, ({ payload }) => {
          const payloadSessionId = payload?.session_id === null || payload?.session_id === undefined
            ? null
            : String(payload.session_id);
          if (payloadSessionId && currentSessionId && payloadSessionId !== currentSessionId) return;
          if (state !== 'listening') return;
          setMeter(payload?.level, payload?.bars);
        }).catch(() => {});
        ev.listen('dictation:hotkey-triggered', () => { if (state !== 'processing') click.click(); }).catch(() => {});
      }

      resetMeter();
    })();
  </script>
</body>
</html>
